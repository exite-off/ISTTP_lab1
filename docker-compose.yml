services:
  postgres:
    image: postgres:16
    container_name: inventory_postgres
    environment:
      POSTGRES_DB: InventoryDb
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
